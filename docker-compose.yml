version: '3.8'

services:
  ios-tweak-studio:
    build: .
    container_name: ios-tweak-studio
    ports:
      - "12300:12300"
    environment:
      - NODE_ENV=production
      - AI_PROVIDER=${AI_PROVIDER:-gemini}
      - GEMINI_API_KEY=${GEMINI_API_KEY:-}
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_BASE_URL=${OPENAI_BASE_URL:-https://api.openai.com/v1}
      - AI_MODEL=${AI_MODEL:-}
    restart: always

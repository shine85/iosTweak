name: iOS Tweak Build (FORCE_v1.1.60)

on:
  push:
    branches: [ "*" ]

# 并发控制：彻底锁定，确保仓库内同一时间只有一个构建任务在走，避免堆积
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # 强制刷新标识
      FORCE_BUILD_ID: "1.1.60"

    steps:
      - name: "1. 检出代码"
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: "2. 环境初始化 (v1.1.6)"
        run: |
          echo ">>> 正在执行 v1.1.6 逻辑 <<<"
          sudo apt-get update
          # 安装必要的编译依赖
          sudo apt-get install -y build-essential curl perl git libssl-dev clang libicu-dev xz-utils bzip2 libfl-dev
          # 安装 ldid
          sudo curl -L https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_x86_64 -o /usr/local/bin/ldid
          sudo chmod +x /usr/local/bin/ldid

      - name: "3. 配置 Theos"
        run: |
          rm -rf $GITHUB_WORKSPACE/theos
          git clone --recursive https://github.com/roothide/theos.git $GITHUB_WORKSPACE/theos
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/theos/bin" >> $GITHUB_PATH

      - name: "4. 安装 Toolchain (解决编译器缺失)"
        run: |
          mkdir -p $GITHUB_WORKSPACE/theos/toolchain
          echo ">>> 正在下载最新的 iOS 工具链 (L1ghtmann) <<<"
          curl -LO --fail https://github.com/L1ghtmann/llvm-project/releases/latest/download/iOSToolchain-x86_64.tar.xz
          
          echo ">>> 正在解压工具链 <<<"
          tar -C $GITHUB_WORKSPACE/theos/toolchain -xJf iOSToolchain-x86_64.tar.xz
          
          echo ">>> 检查编译器状态 <<<"
          if [ -f "$GITHUB_WORKSPACE/theos/toolchain/linux/iphone/bin/clang" ]; then
            echo "Compiler found: $($GITHUB_WORKSPACE/theos/toolchain/linux/iphone/bin/clang --version | head -n 1)"
          else
            echo "Error: Toolchain extraction failed or clang not found!"
            ls -R $GITHUB_WORKSPACE/theos/toolchain
            exit 1
          fi

      - name: "5. 下载 iOS SDK"
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $GITHUB_WORKSPACE/theos/sdks

      - name: "6. 设置 Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "7. 构建 Web App"
        run: |
          npm install
          npm run build
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}

      - name: "8. 获取应用名称"
        id: app_info
        run: |
          if [ -f control ]; then
            APP_NAME=$(grep -i "^Name:" control | cut -d':' -f2 | sed -e 's/^[[:space:]]*//' | tr -d '\n\r')
            if [ -z "$APP_NAME" ]; then APP_NAME="ios-tweak"; fi
          else
            APP_NAME="ios-tweak"
          fi
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: "8.5 转换应用名称为拼音 (强制 ASCII 兼容)"
        run: |
          python3 -m pip install pypinyin
          # 将 APP_NAME 转换为拼音并去除非字母数字字符
          SAFE_APP_NAME=$(python3 -c "import re; from pypinyin import lazy_pinyin; name=''.join(lazy_pinyin('${{ env.APP_NAME }}')); print(re.sub(r'[^a-zA-Z0-9-]', '', name).lower())")
          echo "SAFE_APP_NAME=$SAFE_APP_NAME" >> $GITHUB_ENV

      - name: "9. 编译多平台 Tweak 并重命名产物"
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          
          mkdir -p final_artifacts
          
          if [ ! -f Makefile ]; then
            echo "Makefile 不存在，跳过编译"
            touch final_artifacts/skip_build.txt
            exit 0
          fi

          TWEAK_NAME=$(grep -i "^TWEAK_NAME" Makefile | cut -d'=' -f2 | sed -e 's/^[[:space:]]*//' | tr -d '\n\r')
          # 提取当前项目的版本号
          TWEAK_VERSION=$(grep "^  \"version\":" package.json | awk -F": " '{print $2}' | sed 's/[",]//g' | xargs)
          VER_SUFFIX="v${TWEAK_VERSION}"
          
          if [ -f control ]; then
            sed -i "s/^Version:.*/Version: ${TWEAK_VERSION}/" control
          fi
          
          # 1. Rootless 编译
          echo ">>> 编译 Rootless (无根) <<<"
          make clean
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1 GO_EASY_ON_ME=1
          ROOTLESS_DEB=$(find packages -name "*.deb" | head -n 1)
          if [ -n "$ROOTLESS_DEB" ]; then
            cp "$ROOTLESS_DEB" "final_artifacts/${SAFE_APP_NAME}-${VER_SUFFIX}-arm64-rootless.deb"
          fi
          
          # 提取 Dylib (使用 toolchain 的 lipo 提取纯 arm64 切片，解决 TrollFools ldid 签名不支持 arm64e 导致 Unsupported Mach-O type 的问题)
          DYLIB_PATH=$(find .theos/obj -type f -name "${TWEAK_NAME}.dylib" | awk '{print length, $0}' | sort -n | awk '{print $2}' | head -n 1)
          if [ -n "$DYLIB_PATH" ]; then
            if [ -f "$GITHUB_WORKSPACE/theos/toolchain/linux/iphone/bin/lipo" ]; then
              $GITHUB_WORKSPACE/theos/toolchain/linux/iphone/bin/lipo "$DYLIB_PATH" -thin arm64 -output "final_artifacts/${SAFE_APP_NAME}-${VER_SUFFIX}.dylib" || cp "$DYLIB_PATH" "final_artifacts/${SAFE_APP_NAME}-${VER_SUFFIX}.dylib"
            else
              cp "$DYLIB_PATH" "final_artifacts/${SAFE_APP_NAME}-${VER_SUFFIX}.dylib"
            fi
          fi
          
          rm -rf packages/*
          
          # 2. Roothide 编译
          echo ">>> 编译 Roothide (隐根) <<<"
          make clean
          make package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1 GO_EASY_ON_ME=1
          ROOTHIDE_DEB=$(find packages -name "*.deb" | head -n 1)
          if [ -n "$ROOTHIDE_DEB" ]; then
            cp "$ROOTHIDE_DEB" "final_artifacts/${SAFE_APP_NAME}-${VER_SUFFIX}-arm64e-roothide.deb"
          fi
          
          echo ">>> 可用产物列表 <<<"
          ls -R final_artifacts

      - name: "10. 上传最终产物"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}
          path: final_artifacts/*

      - name: "11. 发布 Release (历史共存模式)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f final_artifacts/skip_build.txt ]; then
            echo "无产物，跳过发布 Release"
            exit 0
          fi
          
          # 以 APP_NAME 作为 Tag 基准
          TAG_NAME="latest-${APP_NAME}"
          RELEASE_TITLE="${APP_NAME} 聚合发布页"
          
          # 检查 Release 是否已存在
          if gh release view "$TAG_NAME" >/dev/null 2>&1; then
            echo ">>> Release 已存在，正在追加最新版本产物... <<<"
            # 使用 --clobber 如果文件名撞了就覆盖，但由于带了版本号，通常不会撞
            gh release upload "$TAG_NAME" final_artifacts/* --clobber
          else
            echo ">>> 首次创建 Release... <<<"
            gh release create "$TAG_NAME" final_artifacts/* --title "$RELEASE_TITLE" --notes "该页面包含 ${APP_NAME} 的所有历史及最新构建产物列表。"
          fi
          
          echo ">>> App 专属 Release 更新完成！ <<<"

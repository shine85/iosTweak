name: Build and Package Tweak

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential curl perl git libssl-dev clang libicu-dev cctools-port

      - name: Set up Theos
        run: |
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/theos/bin" >> $GITHUB_PATH

      - name: Download iOS SDK
        run: |
          mkdir -p $GITHUB_WORKSPACE/theos/sdks
          curl -L https://github.com/theos/sdks/raw/master/iPhoneOS14.5.sdk.tar.xz | tar -xJ -C $GITHUB_WORKSPACE/theos/sdks

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: Install NPM Dependencies
        run: npm install

      - name: Build Web App
        run: npm run build
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}

      - name: Compile Tweak (DEB)
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          # 如果没有 Makefile，创建一个空的避免报错，或者直接执行编译
          if [ -f Makefile ]; then
            make package FINALPACKAGE=1
          else
            echo "Makefile not found! Creating a placeholder for testing..."
            mkdir -p packages
            touch packages/no_makefile_found.txt
          fi

      - name: Debug Output
        run: |
          echo "Listing all files in current directory:"
          ls -R
          echo "Checking packages directory:"
          ls -la packages || echo "packages dir not found"

      - name: Upload Build Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ios-tweak-packages
          # 宽泛匹配，确保只要是 deb 或者咱们生成的测试文件都能上传
          path: |
            packages/*.deb
            packages/*.txt
          if-no-files-found: warn

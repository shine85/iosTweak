name: iOS Tweak Build (FORCE_v1.1.2)

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    env:
      # 强制刷新标识：v1.1.2 (修正 Toolchain 下载链接及解压逻辑)
      FORCE_BUILD_ID: "v1.1.2"

    steps:
      - name: "1. 检出代码"
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: "2. 环境初始化 (v1.1.2)"
        run: |
          echo ">>> 正在执行 v1.1.2 逻辑 <<<"
          sudo apt-get update
          # 安装必要的编译依赖，确保包含 xz-utils (用于 .tar.xz) 和 bzip2 (用于 .tar.bz2)
          sudo apt-get install -y build-essential curl perl git libssl-dev clang libicu-dev xz-utils bzip2 libfl-dev
          # 安装 ldid
          sudo curl -L https://github.com/procursus-team/ldid/releases/latest/download/ldid_linux_x86_64 -o /usr/local/bin/ldid
          sudo chmod +x /usr/local/bin/ldid

      - name: "3. 配置 Theos"
        run: |
          rm -rf $GITHUB_WORKSPACE/theos
          git clone --recursive https://github.com/theos/theos.git $GITHUB_WORKSPACE/theos
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/theos/bin" >> $GITHUB_PATH

      - name: "4. 安装 Toolchain (解决编译器缺失)"
        run: |
          mkdir -p $GITHUB_WORKSPACE/theos/toolchain/linux/iphone
          # sbingner Toolchain 的链接可能极其不稳定，此处使用最通用的 .bz2 格式并增加失败强制停止
          # 备选链接: https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64-toolchain.tar.xz
          curl -LO --fail https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64-toolchain.tar.bz2 || \
          curl -LO --fail https://github.com/sbingner/llvm-project/releases/download/v10.0.0-1/linux-ios-arm64-toolchain.tar.xz
          
          # 自动识别并解压到指定目录
          FILE=$(ls linux-ios-arm64-toolchain.tar.*)
          echo ">>> 正在解压工具链文件: $FILE <<<"
          tar -C $GITHUB_WORKSPACE/theos/toolchain/linux/iphone --strip-components=1 -xf $FILE
          
          echo ">>> 检查编译器路径 <<<"
          ls -l $GITHUB_WORKSPACE/theos/toolchain/linux/iphone/bin/clang

      - name: "5. 下载 iOS SDK"
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $GITHUB_WORKSPACE/theos/sdks

      - name: "6. 设置 Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "7. 构建 Web App"
        run: |
          npm install
          npm run build
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}

      - name: "8. 编译 Tweak (DEB)"
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          if [ -f Makefile ]; then
            make package FINALPACKAGE=1
          else
            echo "Makefile 不存在，跳过编译"
            mkdir -p packages
            touch packages/skip_build.txt
          fi

      - name: "9. 上传产物"
        uses: actions/upload-artifact@v4
        with:
          name: ios-tweak-v1.1.2
          path: |
            packages/*.deb
            packages/*.txt

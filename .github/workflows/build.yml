name: iOS Tweak Build (FORCE_v1.1.12)

on:
  push:
    branches: [ "*" ]
  pull_request:
    branches: [ "*" ]

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    env:
      # 强制刷新标识：v1.1.13 (修复动态替换 Makefile 变量名导致编译时找不到文件的问题)
      FORCE_BUILD_ID: "v1.1.13"

    steps:
      - name: "1. 检出代码"
        uses: actions/checkout@v4
        with:
          submodules: recursive

      - name: "2. 环境初始化 (v1.1.6)"
        run: |
          echo ">>> 正在执行 v1.1.6 逻辑 <<<"
          sudo apt-get update
          # 安装必要的编译依赖
          sudo apt-get install -y build-essential curl perl git libssl-dev clang libicu-dev xz-utils bzip2 libfl-dev
          # 安装 ldid
          sudo curl -L https://github.com/ProcursusTeam/ldid/releases/latest/download/ldid_linux_x86_64 -o /usr/local/bin/ldid
          sudo chmod +x /usr/local/bin/ldid

      - name: "3. 配置 Theos"
        run: |
          rm -rf $GITHUB_WORKSPACE/theos
          git clone --recursive https://github.com/roothide/theos.git $GITHUB_WORKSPACE/theos
          echo "THEOS=$GITHUB_WORKSPACE/theos" >> $GITHUB_ENV
          echo "$GITHUB_WORKSPACE/theos/bin" >> $GITHUB_PATH

      - name: "4. 安装 Toolchain (解决编译器缺失)"
        run: |
          mkdir -p $GITHUB_WORKSPACE/theos/toolchain
          echo ">>> 正在下载最新的 iOS 工具链 (L1ghtmann) <<<"
          curl -LO --fail https://github.com/L1ghtmann/llvm-project/releases/latest/download/iOSToolchain-x86_64.tar.xz
          
          echo ">>> 正在解压工具链 <<<"
          tar -C $GITHUB_WORKSPACE/theos/toolchain -xJf iOSToolchain-x86_64.tar.xz
          
          echo ">>> 检查编译器状态 <<<"
          if [ -f "$GITHUB_WORKSPACE/theos/toolchain/linux/iphone/bin/clang" ]; then
            echo "Compiler found: $($GITHUB_WORKSPACE/theos/toolchain/linux/iphone/bin/clang --version | head -n 1)"
          else
            echo "Error: Toolchain extraction failed or clang not found!"
            ls -R $GITHUB_WORKSPACE/theos/toolchain
            exit 1
          fi

      - name: "5. 下载 iOS SDK"
        run: |
          rm -rf $GITHUB_WORKSPACE/theos/sdks
          git clone --depth 1 https://github.com/theos/sdks.git $GITHUB_WORKSPACE/theos/sdks

      - name: "6. 设置 Node.js"
        uses: actions/setup-node@v4
        with:
          node-version: '24'
          cache: 'npm'

      - name: "7. 构建 Web App"
        run: |
          npm install
          npm run build
        env:
          VITE_FIREBASE_PROJECT_ID: ${{ secrets.VITE_FIREBASE_PROJECT_ID }}
          VITE_FIREBASE_APP_ID: ${{ secrets.VITE_FIREBASE_APP_ID }}
          VITE_FIREBASE_API_KEY: ${{ secrets.VITE_FIREBASE_API_KEY }}
          VITE_FIREBASE_AUTH_DOMAIN: ${{ secrets.VITE_FIREBASE_AUTH_DOMAIN }}
          VITE_FIREBASE_FIRESTORE_DATABASE_ID: ${{ secrets.VITE_FIREBASE_FIRESTORE_DATABASE_ID }}
          VITE_FIREBASE_STORAGE_BUCKET: ${{ secrets.VITE_FIREBASE_STORAGE_BUCKET }}
          VITE_FIREBASE_MESSAGING_SENDER_ID: ${{ secrets.VITE_FIREBASE_MESSAGING_SENDER_ID }}

      - name: "8. 获取应用名称"
        id: app_info
        run: |
          if [ -f control ]; then
            APP_NAME=$(grep -i "^Name:" control | cut -d':' -f2 | sed -e 's/^[[:space:]]*//' | tr -d '\n\r')
            if [ -z "$APP_NAME" ]; then APP_NAME="ios-tweak"; fi
          else
            APP_NAME="ios-tweak"
          fi
          echo "APP_NAME=$APP_NAME" >> $GITHUB_ENV

      - name: "9. 编译多平台 Tweak 并重命名产物"
        run: |
          export THEOS=$GITHUB_WORKSPACE/theos
          
          mkdir -p final_artifacts
          
          if [ ! -f Makefile ]; then
            echo "Makefile 不存在，跳过编译"
            touch final_artifacts/skip_build.txt
            exit 0
          fi

          TWEAK_NAME=$(grep -i "^TWEAK_NAME" Makefile | cut -d'=' -f2 | sed -e 's/^[[:space:]]*//' | tr -d '\n\r')
          
          # 1. Rootless 编译
          echo ">>> 编译 Rootless (无根) <<<"
          make clean
          make package THEOS_PACKAGE_SCHEME=rootless FINALPACKAGE=1
          ROOTLESS_DEB=$(find packages -name "*.deb" | head -n 1)
          if [ -n "$ROOTLESS_DEB" ]; then
            mv "$ROOTLESS_DEB" "final_artifacts/${TWEAK_NAME}-arm64-rootless(无根).deb"
          fi
          
          # 提取 Dylib
          DYLIB_PATH=$(find .theos/obj -name "${TWEAK_NAME}.dylib" | head -n 1)
          if [ -n "$DYLIB_PATH" ]; then
            cp "$DYLIB_PATH" "final_artifacts/ios-${TWEAK_NAME}-v1.1.11.dylib"
          fi
          
          rm -rf packages/*
          
          # 2. Roothide 编译
          echo ">>> 编译 Roothide (隐根) <<<"
          make clean
          make package THEOS_PACKAGE_SCHEME=roothide FINALPACKAGE=1
          ROOTHIDE_DEB=$(find packages -name "*.deb" | head -n 1)
          if [ -n "$ROOTHIDE_DEB" ]; then
            mv "$ROOTHIDE_DEB" "final_artifacts/${TWEAK_NAME}-arm64e-roothide(隐根).deb"
          fi
          
          echo ">>> 可用产物列表 <<<"
          ls -R final_artifacts

      - name: "10. 上传最终产物"
        uses: actions/upload-artifact@v4
        with:
          name: ${{ env.APP_NAME }}
          path: final_artifacts/*

      - name: "11. 发布 Release (保留最新3份)"
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          if [ -f final_artifacts/skip_build.txt ]; then
            echo "无产物，跳过发布 Release"
            exit 0
          fi
          
          # 以时间作为 Tag，保证唯一性
          TAG_NAME="v1.1.12-$(date +'%Y%m%d%H%M%S')"
          RELEASE_TITLE="${APP_NAME} ${TAG_NAME}"
          
          # 创建 Release 并附加产物
          echo ">>> 创建 Release $TAG_NAME <<<"
          gh release create "$TAG_NAME" final_artifacts/* --title "$RELEASE_TITLE" --notes "自动发布的 iOS Tweak 多平台产物"
          
          # 清理旧版 Release（仅保留最新 3 个）
          echo ">>> 正在清理旧版 Release <<<"
          gh api "repos/$GITHUB_REPOSITORY/releases" --jq '.[].tag_name' > releases.txt
          RELEASE_COUNT=$(wc -l < releases.txt)
          
          if [ "$RELEASE_COUNT" -gt 3 ]; then
            tail -n +4 releases.txt | while read tag; do
              if [ -n "$tag" ]; then
                echo ">>> 删除旧版 Release: $tag <<<"
                gh release delete "$tag" -y --cleanup-tag || true
              fi
            done
          else
            echo "当前 Release 数量 ($RELEASE_COUNT) 未超过 3 个，无需清理。"
          fi
